upstream harvestgrow_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    # TODO: replace with real domain once DNS is set (e.g. api.harvestgrow-veg.com)
    server_name api.harvestgrow-veg.com;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 256;

    location / {
        proxy_pass http://harvestgrow_api;
        proxy_http_version 1.1;

        # Keepalive to upstream (reuse connections to Node)
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;

        # Max upload size
        client_max_body_size 10M;
    }

    # WebSocket support (if needed later)
    location /ws {
        proxy_pass http://harvestgrow_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
    }
}
